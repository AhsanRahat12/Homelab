apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: democratic-csi
  namespace: democratic-csi
spec:
  interval: 1h
  chart:
    spec:
      chart: democratic-csi
      version: "0.15.1"
      sourceRef:
        kind: HelmRepository
        name: democratic-csi
        namespace: democratic-csi
      interval: 12h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  driftDetection:
    mode: enabled
  values:
    csiDriver:
      name: "org.democratic-csi.node-manual"

    controller:
      enabled: true
      strategy: node
      externalAttacher:
        enabled: true
      externalProvisioner:
        enabled: false
      externalResizer:
        enabled: false
      externalSnapshotter:
        enabled: false

    node:
      enabled: true
      hostPID: true
      hostNetwork: true
      driver:
        image:
          registry: ghcr.io/democratic-csi/democratic-csi
          tag: "latest@sha256:c9db19643ee01c0d1641614061d6c3f0a2c7f68565e5a807bdfb740ca4cb9dff"
          pullPolicy: IfNotPresent

    driver:
      config:
        driver: node-manual

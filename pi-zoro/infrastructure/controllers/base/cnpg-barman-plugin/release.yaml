apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cnpg-barman-plugin
  namespace: cnpg-system
spec:
  interval: 1h
  dependsOn:
    - name: cnpg
      namespace: cnpg-system
  chart:
    spec:
      chart: plugin-barman-cloud
      version: "0.5.0"
      sourceRef:
        kind: HelmRepository
        name: cnpg-barman-plugin
        namespace: cnpg-system
      interval: 12h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  driftDetection:
    mode: enabled

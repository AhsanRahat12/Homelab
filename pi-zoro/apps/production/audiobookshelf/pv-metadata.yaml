apiVersion: v1
kind: PersistentVolume
metadata:
  name: audiobookshelf-metadata-pv
spec:
  capacity:
    storage: 2Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: qnap-iscsi-manual
  csi:
    driver: org.democratic-csi.node-manual
    volumeHandle: audiobookshelf-metadata
    volumeAttributes:
      provisioner_driver: node-manual
      node_attach_driver: iscsi
      portal: 192.168.1.153:3260
      iqn: iqn.2004-04.com.qnap:ts-464:iscsi.target-0.88196c
      lun: "2"
      targetPortal: 192.168.1.153:3260
    nodeStageSecretRef:
      name: democratic-csi-iscsi-chap
      namespace: democratic-csi

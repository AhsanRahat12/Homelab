apiVersion: apps/v1
kind: Deployment
metadata:
  name: audiobookshelf
  labels:
    app: audiobookshelf
spec:
  replicas: 1
  selector:
    matchLabels:
      app: audiobookshelf
  template:
    metadata:
      labels:
        app: audiobookshelf
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000

      containers:
      - name: audiobookshelf
        image: ghcr.io/advplyr/audiobookshelf:2.33.2
        ports:
        - containerPort: 3005
        envFrom:
        - configMapRef:
            name: audiobookshelf-config
        volumeMounts:
        - mountPath: /config
          name: config-volume
        - mountPath: /metadata
          name: metadata-volume
        - mountPath: /audiobooks
          name: audiobooks-volume
        - mountPath: /podcasts
          name: podcasts-volume
        securityContext:
          allowPrivilegeEscalation: false
      
      volumes:
      - name: config-volume
        persistentVolumeClaim:
          claimName: config-pvc
      - name: metadata-volume
        persistentVolumeClaim:
          claimName: metadata-pvc
      - name: audiobooks-volume
        persistentVolumeClaim:
          claimName: audiobooks-pvc
      - name: podcasts-volume
        persistentVolumeClaim:
          claimName: podcasts-pvc

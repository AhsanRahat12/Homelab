<svg width="100%" viewBox="0 0 680 530" xmlns="http://www.w3.org/2000/svg">
<title>Linkding production architecture</title>
<desc>Traffic flows from links.rahatahsan.com through Cloudflare to linkding on a two-node Kubernetes cluster, with democratic-csi managing iSCSI storage on a QNAP NAS, and Flux pulling GitOps deployments from GitHub.</desc>

<style>
  text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
  .title { font-size: 14px; font-weight: 600; }
  .sub { font-size: 12px; opacity: 0.7; }
  .coral-fill { fill: #FFF0EB; stroke: #D85A30; }
  .coral-text { fill: #712B13; }
  .teal-fill { fill: #E1F5EE; stroke: #0F6E56; }
  .teal-text { fill: #085041; }
  .purple-fill { fill: #EEEDFE; stroke: #534AB7; }
  .purple-text { fill: #3C3489; }
  .gray-text { fill: #5F5E5A; }
  .cluster-border { fill: none; stroke: #B4B2A9; stroke-dasharray: 6 4; }
  .arr { stroke-width: 1.5; fill: none; }
  .arr-coral { stroke: #D85A30; }
  .arr-teal { stroke: #0F6E56; }
  .arr-purple { stroke: #534AB7; }
  .arr-muted { stroke: #888780; stroke-dasharray: 4 3; }

  @media (prefers-color-scheme: dark) {
    .coral-fill { fill: #4A1B0C; stroke: #F0997B; }
    .coral-text { fill: #F5C4B3; }
    .teal-fill { fill: #04342C; stroke: #5DCAA5; }
    .teal-text { fill: #9FE1CB; }
    .purple-fill { fill: #26215C; stroke: #AFA9EC; }
    .purple-text { fill: #CECBF6; }
    .gray-text { fill: #B4B2A9; }
    .cluster-border { stroke: #5F5E5A; }
    .arr-coral { stroke: #F0997B; }
    .arr-teal { stroke: #5DCAA5; }
    .arr-purple { stroke: #AFA9EC; }
    .arr-muted { stroke: #888780; }
    .sub { opacity: 0.6; }
  }
</style>

<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- links.rahatahsan.com -->
<rect class="coral-fill" x="40" y="30" width="240" height="44" rx="8" stroke-width="0.5"/>
<text class="title coral-text" x="160" y="52" text-anchor="middle" dominant-baseline="central">links.rahatahsan.com</text>

<!-- GitHub -->
<rect class="purple-fill" x="400" y="30" width="240" height="44" rx="8" stroke-width="0.5"/>
<text class="title purple-text" x="520" y="52" text-anchor="middle" dominant-baseline="central">GitHub</text>

<!-- Arrow: URL → Cloudflare Edge -->
<line x1="160" y1="74" x2="160" y2="108" class="arr arr-coral" marker-end="url(#arrow)"/>

<!-- Cloudflare Edge -->
<rect class="coral-fill" x="40" y="110" width="240" height="56" rx="8" stroke-width="0.5"/>
<text class="title coral-text" x="160" y="130" text-anchor="middle" dominant-baseline="central">Cloudflare Edge</text>
<text class="sub coral-text" x="160" y="150" text-anchor="middle" dominant-baseline="central">TLS termination</text>

<!-- Arrow: Cloudflare Edge → Tunnel (into cluster) -->
<line x1="160" y1="166" x2="148" y2="250" class="arr arr-coral" marker-end="url(#arrow)"/>

<!-- Arrow: GitHub → Flux (into cluster) -->
<line x1="520" y1="74" x2="530" y2="250" class="arr arr-purple" marker-end="url(#arrow)"/>

<!-- Kubernetes cluster container -->
<rect class="cluster-border" x="25" y="200" width="630" height="220" rx="16" stroke-width="0.5"/>
<text class="title gray-text" x="340" y="222" text-anchor="middle">Kubernetes cluster</text>
<text class="sub gray-text" x="340" y="238" text-anchor="middle">Zoro + Luffy — pod schedules on either node</text>

<!-- Cloudflare Tunnel -->
<rect class="coral-fill" x="50" y="255" width="190" height="40" rx="8" stroke-width="0.5"/>
<text class="title coral-text" x="145" y="275" text-anchor="middle" dominant-baseline="central">Cloudflare Tunnel</text>

<!-- linkding -->
<rect class="teal-fill" x="265" y="252" width="150" height="46" rx="8" stroke-width="0.5"/>
<text class="title teal-text" x="340" y="275" text-anchor="middle" dominant-baseline="central">linkding</text>

<!-- Flux -->
<rect class="purple-fill" x="440" y="255" width="190" height="40" rx="8" stroke-width="0.5"/>
<text class="title purple-text" x="535" y="275" text-anchor="middle" dominant-baseline="central">Flux</text>

<!-- Arrow: Tunnel → linkding -->
<line x1="240" y1="275" x2="263" y2="275" class="arr arr-coral" marker-end="url(#arrow)"/>

<!-- Arrow: Flux → linkding (dashed, manages) -->
<line x1="440" y1="275" x2="417" y2="275" class="arr arr-muted" marker-end="url(#arrow)"/>

<!-- democratic-csi -->
<rect class="teal-fill" x="250" y="338" width="180" height="40" rx="8" stroke-width="0.5"/>
<text class="title teal-text" x="340" y="358" text-anchor="middle" dominant-baseline="central">democratic-csi</text>

<!-- Arrow: linkding → democratic-csi -->
<line x1="340" y1="298" x2="340" y2="336" class="arr arr-teal" marker-end="url(#arrow)"/>

<!-- Arrow: democratic-csi → QNAP -->
<line x1="340" y1="378" x2="340" y2="448" class="arr arr-teal" marker-end="url(#arrow)"/>
<text class="sub gray-text" x="356" y="418">iSCSI</text>

<!-- QNAP NAS -->
<rect class="teal-fill" x="230" y="450" width="220" height="56" rx="8" stroke-width="0.5"/>
<text class="title teal-text" x="340" y="470" text-anchor="middle" dominant-baseline="central">QNAP NAS</text>
<text class="sub teal-text" x="340" y="488" text-anchor="middle" dominant-baseline="central">iSCSI LUN — 1Gi thick</text>

</svg>

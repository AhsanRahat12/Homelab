apiVersion: v1
kind: Pod
metadata:
  name: migrate-linkding
  namespace: linkding-prod
spec:
  restartPolicy: Never
  nodeSelector:
    kubernetes.io/hostname: zoro
  containers:
  - name: migrate
    image: alpine
    command: ["sh", "-c", "apk add rsync && sleep 3600"]
    volumeMounts:
    - name: old-data
      mountPath: /old
    - name: new-data
      mountPath: /new
  volumes:
  - name: old-data
    hostPath:
      path: /var/lib/rancher/k3s/storage/pvc-f0e78299-2cf2-46bc-be28-a0a601e98273_linkding_linkding-data-pvc
  - name: new-data
    hostPath:
      path: /mnt/linkding-data

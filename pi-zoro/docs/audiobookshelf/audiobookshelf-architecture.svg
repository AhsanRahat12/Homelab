<svg width="100%" viewBox="0 0 680 580" xmlns="http://www.w3.org/2000/svg">
<title>Audiobookshelf production architecture</title>
<desc>Traffic flows from audiobooks.rahatahsan.com through Cloudflare to audiobookshelf on a two-node Kubernetes cluster. Config and metadata use iSCSI LUNs managed by democratic-csi. Audiobooks and podcasts use NFS shares. All storage lives on a QNAP NAS. Flux handles GitOps deployments from GitHub.</desc>

<style>
  text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
  .title { font-size: 14px; font-weight: 600; }
  .sub { font-size: 12px; opacity: 0.7; }
  .coral-fill { fill: #FFF0EB; stroke: #D85A30; }
  .coral-text { fill: #712B13; }
  .teal-fill { fill: #E1F5EE; stroke: #0F6E56; }
  .teal-text { fill: #085041; }
  .purple-fill { fill: #EEEDFE; stroke: #534AB7; }
  .purple-text { fill: #3C3489; }
  .gray-text { fill: #5F5E5A; }
  .cluster-border { fill: none; stroke: #B4B2A9; stroke-dasharray: 6 4; }
  .qnap-border { fill: #F8F7F4; stroke: #B4B2A9; }
  .arr { stroke-width: 1.5; fill: none; }
  .arr-coral { stroke: #D85A30; }
  .arr-teal { stroke: #0F6E56; }
  .arr-purple { stroke: #534AB7; }
  .arr-muted { stroke: #888780; stroke-dasharray: 4 3; }

  @media (prefers-color-scheme: dark) {
    .coral-fill { fill: #4A1B0C; stroke: #F0997B; }
    .coral-text { fill: #F5C4B3; }
    .teal-fill { fill: #04342C; stroke: #5DCAA5; }
    .teal-text { fill: #9FE1CB; }
    .purple-fill { fill: #26215C; stroke: #AFA9EC; }
    .purple-text { fill: #CECBF6; }
    .gray-text { fill: #B4B2A9; }
    .cluster-border { stroke: #5F5E5A; }
    .qnap-border { fill: #2C2C2A; stroke: #5F5E5A; }
    .arr-coral { stroke: #F0997B; }
    .arr-teal { stroke: #5DCAA5; }
    .arr-purple { stroke: #AFA9EC; }
    .arr-muted { stroke: #888780; }
    .sub { opacity: 0.6; }
  }
</style>

<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- audiobooks.rahatahsan.com -->
<rect class="coral-fill" x="40" y="30" width="240" height="44" rx="8" stroke-width="0.5"/>
<text class="title coral-text" x="160" y="52" text-anchor="middle" dominant-baseline="central">audiobooks.rahatahsan.com</text>

<!-- GitHub -->
<rect class="purple-fill" x="400" y="30" width="240" height="44" rx="8" stroke-width="0.5"/>
<text class="title purple-text" x="520" y="52" text-anchor="middle" dominant-baseline="central">GitHub</text>

<!-- Arrow: URL → Cloudflare Edge -->
<line x1="160" y1="74" x2="160" y2="108" class="arr arr-coral" marker-end="url(#arrow)"/>

<!-- Cloudflare Edge -->
<rect class="coral-fill" x="40" y="110" width="240" height="56" rx="8" stroke-width="0.5"/>
<text class="title coral-text" x="160" y="130" text-anchor="middle" dominant-baseline="central">Cloudflare Edge</text>
<text class="sub coral-text" x="160" y="150" text-anchor="middle" dominant-baseline="central">TLS termination</text>

<!-- Arrow: Cloudflare Edge → Tunnel (into cluster) -->
<line x1="160" y1="166" x2="148" y2="250" class="arr arr-coral" marker-end="url(#arrow)"/>

<!-- Arrow: GitHub → Flux (into cluster) -->
<line x1="520" y1="74" x2="540" y2="250" class="arr arr-purple" marker-end="url(#arrow)"/>

<!-- Kubernetes cluster container -->
<rect class="cluster-border" x="25" y="200" width="630" height="210" rx="16" stroke-width="0.5"/>
<text class="title gray-text" x="340" y="222" text-anchor="middle">Kubernetes cluster</text>
<text class="sub gray-text" x="340" y="238" text-anchor="middle">Zoro + Luffy — pod schedules on either node</text>

<!-- Cloudflare Tunnel -->
<rect class="coral-fill" x="50" y="255" width="190" height="40" rx="8" stroke-width="0.5"/>
<text class="title coral-text" x="145" y="275" text-anchor="middle" dominant-baseline="central">Cloudflare Tunnel</text>

<!-- audiobookshelf -->
<rect class="teal-fill" x="255" y="252" width="170" height="46" rx="8" stroke-width="0.5"/>
<text class="title teal-text" x="340" y="275" text-anchor="middle" dominant-baseline="central">audiobookshelf</text>

<!-- Flux -->
<rect class="purple-fill" x="450" y="255" width="180" height="40" rx="8" stroke-width="0.5"/>
<text class="title purple-text" x="540" y="275" text-anchor="middle" dominant-baseline="central">Flux</text>

<!-- Arrow: Tunnel → audiobookshelf -->
<line x1="240" y1="275" x2="253" y2="275" class="arr arr-coral" marker-end="url(#arrow)"/>

<!-- Arrow: Flux → audiobookshelf (dashed, manages) -->
<line x1="450" y1="275" x2="427" y2="275" class="arr arr-muted" marker-end="url(#arrow)"/>

<!-- democratic-csi -->
<rect class="teal-fill" x="80" y="342" width="180" height="40" rx="8" stroke-width="0.5"/>
<text class="title teal-text" x="170" y="362" text-anchor="middle" dominant-baseline="central">democratic-csi</text>

<!-- NFS volumes -->
<rect class="teal-fill" x="400" y="342" width="180" height="40" rx="8" stroke-width="0.5"/>
<text class="title teal-text" x="490" y="362" text-anchor="middle" dominant-baseline="central">NFS volumes</text>

<!-- Arrow: audiobookshelf → democratic-csi -->
<line x1="300" y1="298" x2="190" y2="340" class="arr arr-teal" marker-end="url(#arrow)"/>

<!-- Arrow: audiobookshelf → NFS volumes -->
<line x1="380" y1="298" x2="470" y2="340" class="arr arr-teal" marker-end="url(#arrow)"/>

<!-- QNAP NAS container -->
<rect class="qnap-border" x="60" y="450" width="560" height="110" rx="16" stroke-width="0.5"/>
<text class="title gray-text" x="340" y="472" text-anchor="middle">QNAP NAS</text>

<!-- iSCSI LUNs section -->
<rect class="teal-fill" x="80" y="485" width="230" height="56" rx="8" stroke-width="0.5"/>
<text class="title teal-text" x="195" y="505" text-anchor="middle" dominant-baseline="central">iSCSI LUNs</text>
<text class="sub teal-text" x="195" y="523" text-anchor="middle" dominant-baseline="central">config + metadata, 2Gi</text>

<!-- NFS shares section -->
<rect class="teal-fill" x="340" y="485" width="260" height="56" rx="8" stroke-width="0.5"/>
<text class="title teal-text" x="470" y="505" text-anchor="middle" dominant-baseline="central">NFS shares</text>
<text class="sub teal-text" x="470" y="523" text-anchor="middle" dominant-baseline="central">audiobooks + podcasts, 10Gi</text>

<!-- Arrow: democratic-csi → iSCSI LUNs -->
<line x1="170" y1="382" x2="195" y2="483" class="arr arr-teal" marker-end="url(#arrow)"/>
<text class="sub gray-text" x="155" y="435">iSCSI</text>

<!-- Arrow: NFS volumes → NFS shares -->
<line x1="490" y1="382" x2="470" y2="483" class="arr arr-teal" marker-end="url(#arrow)"/>
<text class="sub gray-text" x="498" y="435">NFS</text>

</svg>

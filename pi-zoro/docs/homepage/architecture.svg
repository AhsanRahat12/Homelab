<svg width="100%" viewBox="0 0 680 520" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Homepage production architecture</title>
<desc>Traffic flows from homepage.rahatahsan.com through Cloudflare to the homepage pod on a two-node Kubernetes cluster. Config lives in a ConfigMap. Flux manages deployments from GitHub. RBAC grants read-only cluster API access for widgets.</desc>

<style>
  text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
  .title { font-size: 14px; font-weight: 600; }
  .sub { font-size: 12px; opacity: 0.7; }
  .coral-fill { fill: #FFF0EB; stroke: #D85A30; }
  .coral-text { fill: #712B13; }
  .teal-fill { fill: #E1F5EE; stroke: #0F6E56; }
  .teal-text { fill: #085041; }
  .purple-fill { fill: #EEEDFE; stroke: #534AB7; }
  .purple-text { fill: #3C3489; }
  .gray-text { fill: #5F5E5A; }
  .cluster-border { fill: none; stroke: #B4B2A9; stroke-dasharray: 6 4; }
  .arr { stroke-width: 1.5; fill: none; }
  .arr-coral { stroke: #D85A30; }
  .arr-teal { stroke: #0F6E56; }
  .arr-purple { stroke: #534AB7; }
  .arr-muted { stroke: #888780; stroke-dasharray: 4 3; }

  @media (prefers-color-scheme: dark) {
    .coral-fill { fill: #4A1B0C; stroke: #F0997B; }
    .coral-text { fill: #F5C4B3; }
    .teal-fill { fill: #04342C; stroke: #5DCAA5; }
    .teal-text { fill: #9FE1CB; }
    .purple-fill { fill: #26215C; stroke: #AFA9EC; }
    .purple-text { fill: #CECBF6; }
    .gray-text { fill: #B4B2A9; }
    .cluster-border { stroke: #5F5E5A; }
    .arr-coral { stroke: #F0997B; }
    .arr-teal { stroke: #5DCAA5; }
    .arr-purple { stroke: #AFA9EC; }
    .arr-muted { stroke: #888780; }
    .sub { opacity: 0.6; }
  }
</style>

<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<rect class="coral-fill" x="40" y="30" width="240" height="44" rx="8" stroke-width="0.5"/>
<text class="title coral-text" x="160" y="52" text-anchor="middle" dominant-baseline="central">homepage.rahatahsan.com</text>

<rect class="purple-fill" x="400" y="30" width="240" height="44" rx="8" stroke-width="0.5"/>
<text class="title purple-text" x="520" y="52" text-anchor="middle" dominant-baseline="central">GitHub</text>

<line x1="160" y1="74" x2="160" y2="108" class="arr arr-coral" marker-end="url(#arrow)"/>

<rect class="coral-fill" x="40" y="110" width="240" height="56" rx="8" stroke-width="0.5"/>
<text class="title coral-text" x="160" y="130" text-anchor="middle" dominant-baseline="central">Cloudflare Edge</text>
<text class="sub coral-text" x="160" y="150" text-anchor="middle" dominant-baseline="central">TLS termination</text>

<line x1="160" y1="166" x2="148" y2="248" class="arr arr-coral" marker-end="url(#arrow)"/>
<line x1="520" y1="74" x2="540" y2="248" class="arr arr-purple" marker-end="url(#arrow)"/>

<rect class="cluster-border" x="25" y="198" width="630" height="220" rx="16" stroke-width="0.5"/>
<text class="title gray-text" x="340" y="220" text-anchor="middle">Kubernetes cluster</text>
<text class="sub gray-text" x="340" y="236" text-anchor="middle">Zoro + Luffy — pod schedules on either node</text>

<rect class="coral-fill" x="50" y="253" width="190" height="40" rx="8" stroke-width="0.5"/>
<text class="title coral-text" x="145" y="273" text-anchor="middle" dominant-baseline="central">Cloudflare Tunnel</text>

<rect class="teal-fill" x="255" y="250" width="170" height="46" rx="8" stroke-width="0.5"/>
<text class="title teal-text" x="340" y="270" text-anchor="middle" dominant-baseline="central">homepage pod</text>
<text class="sub teal-text" x="340" y="286" text-anchor="middle" dominant-baseline="central">v1.13.1</text>

<rect class="purple-fill" x="450" y="253" width="180" height="40" rx="8" stroke-width="0.5"/>
<text class="title purple-text" x="540" y="273" text-anchor="middle" dominant-baseline="central">Flux</text>

<line x1="240" y1="273" x2="253" y2="273" class="arr arr-coral" marker-end="url(#arrow)"/>
<line x1="450" y1="273" x2="427" y2="273" class="arr arr-muted" marker-end="url(#arrow)"/>

<rect class="teal-fill" x="80" y="340" width="160" height="40" rx="8" stroke-width="0.5"/>
<text class="title teal-text" x="160" y="360" text-anchor="middle" dominant-baseline="central">ConfigMap</text>

<rect class="teal-fill" x="380" y="340" width="200" height="40" rx="8" stroke-width="0.5"/>
<text class="title teal-text" x="480" y="360" text-anchor="middle" dominant-baseline="central">Kubernetes API</text>

<line x1="300" y1="292" x2="185" y2="338" class="arr arr-teal" marker-end="url(#arrow)"/>
<line x1="380" y1="292" x2="460" y2="338" class="arr arr-teal" marker-end="url(#arrow)"/>

<text class="sub gray-text" x="160" y="395" text-anchor="middle">services, widgets,</text>
<text class="sub gray-text" x="160" y="410" text-anchor="middle">settings (Git-managed)</text>

<text class="sub gray-text" x="480" y="395" text-anchor="middle">pods, nodes, metrics</text>
<text class="sub gray-text" x="480" y="410" text-anchor="middle">read-only via ClusterRole</text>

<text class="sub gray-text" x="520" y="170" text-anchor="middle">SOPS + Age</text>
<text class="sub gray-text" x="520" y="186" text-anchor="middle">encrypted secrets</text>

</svg>

apiVersion: v1
kind: PersistentVolume
metadata:
  name: cnpg-primary-pv
spec:
  claimRef:
    name: cnpg-cluster-2
    namespace: cnpg
  capacity:
    storage: 20Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: qnap-iscsi-manual
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - luffy
  csi:
    driver: org.democratic-csi.node-manual
    volumeHandle: cnpg-primary
    volumeAttributes:
      provisioner_driver: node-manual
      node_attach_driver: iscsi
      portal: 192.168.1.153:3260
      iqn: iqn.2004-04.com.qnap:ts-464:iscsi.target-0.88196c
      lun: "6"
      targetPortal: 192.168.1.153:3260
    nodeStageSecretRef:
      name: democratic-csi-iscsi-chap
      namespace: democratic-csi

apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 30m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "66.2.2"
      sourceRef:
        kind: HelmRepository
        name: kube-prometheus-stack
        namespace: monitoring
      interval: 12h
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
  driftDetection:
    mode: enabled
    ignore:
      - paths: ["/metadata/annotations/prometheus-operator-validated"]
        target:
          kind: PrometheusRule
  values:
    grafana:
      adminPassword: rahat
      ingress:
        enabled: true
        ingressClassName: traefik
        hosts:
          - grs.rahatahsan.com
        tls:
          - secretName: grafana-tls-secret
            hosts:
              - grs.rahatahsan.com
      persistence:
        enabled: true
        existingClaim: grafana-data-pvc

    prometheus:
      prometheusSpec:
        retention: 30d
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: qnap-iscsi-manual
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 10Gi
              volumeName: prometheus-data-pv

    alertmanager:
      alertmanagerSpec:
        replicas: 1
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: qnap-iscsi-manual
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 1Gi
              volumeName: alertmanager-data-pv

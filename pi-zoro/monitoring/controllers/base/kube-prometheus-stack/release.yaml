apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 30m                   # Check for new chart versions every 30 minutes
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "66.2.2"           # Pin to major.minor; patch updates apply automatically
      # version: "58.x"           # Alternative: pin to major only
      sourceRef:
        kind: HelmRepository      # Must match the `kind` in repository.yaml
        name: kube-prometheus-stack  # Must match the `name` in repository.yaml
        namespace: monitoring
      interval: 12h
  install:
    crds: Create                  # Install CRDs bundled with the chart
  upgrade:
    crds: CreateReplace           # On upgrade: create new CRDs, replace existing ones
  driftDetection:
    mode: enabled                 # Treat the HelmRelease as source of truth; revert manual changes
    ignore:
      # Don't revert this annotation — it's added at runtime, not during install
      - paths: ["/metadata/annotations/prometheus-operator-validated"]
        target:
          kind: PrometheusRule
  values:
    grafana:
      adminPassword: mischa       # Equivalent to a values.yaml override

apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 30m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "66.2.2"
      sourceRef:
        kind: HelmRepository
        name: kube-prometheus-stack
        namespace: monitoring
      interval: 12h
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
  driftDetection:
    mode: enabled
    ignore:
      # This annotation is added at runtime by the operator — do not revert it
      - paths: ["/metadata/annotations/prometheus-operator-validated"]
        target:
          kind: PrometheusRule
  values:
    # -------------------------
    # GRAFANA
    # -------------------------
    grafana:
      adminPassword: rahat
      # Ingress via Traefik with TLS — cert stored in grafana-tls-secret
      ingress:
        enabled: true
        ingressClassName: traefik
        hosts:
          - grs.rahatahsan.com
        tls:
          - secretName: grafana-tls-secret
            hosts:
              - grs.rahatahsan.com
      # Persistent storage — points to pre-bound PVC on QNAP via qnap-iscsi-manual
      # PVC must exist and be Bound before HelmRelease reconciles
      persistence:
        enabled: true
        existingClaim: grafana-data-pvc
    # -------------------------
    # PROMETHEUS
    # -------------------------
    prometheus:
      prometheusSpec:
        # Explicit retention — without this TSDB grows until the LUN is full
        retention: 30d
        # Fresh iSCSI LUNs are root-owned by default
        # fsGroup tells Kubernetes to chown the mount point so Prometheus (non-root) can write
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 2000
          fsGroup: 2000
        # Runs once as root before Prometheus starts
        # Fixes ownership on the iSCSI volume so Prometheus (non-root) can write to it
        # Exits immediately after — Prometheus then starts clean
        # runAsNonRoot: false needed to override pod-level non-root policy for this init only
        initContainers:
          - name: fix-permissions
            image: busybox
            command: ["sh", "-c", "chown -R 1000:2000 /prometheus"]
            securityContext:
              runAsUser: 0
              runAsNonRoot: false
            volumeMounts:
              - name: prometheus-kube-prometheus-stack-prometheus-db
                mountPath: /prometheus
        # Persistent storage — binds to prometheus-data-pv on QNAP
        # volumeName hard-binds to the specific PV we created manually
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: qnap-iscsi-manual
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 35Gi
              volumeName: prometheus-data-pv
    # -------------------------
    # ALERTMANAGER
    # -------------------------
    alertmanager:
      alertmanagerSpec:
        # Single replica — 2-node cluster cannot guarantee scheduling of a second replica
        # A second replica would sit Pending indefinitely
        replicas: 1
        # Persistent storage — binds to alertmanager-data-pv on QNAP
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: qnap-iscsi-manual
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 1Gi
              volumeName: alertmanager-data-pv
        # Mounts the encrypted Slack webhook secret into Alertmanager
        # Referenced in config below via slack_api_url_file
        secrets:
          - alertmanager-slack-webhook
      config:
        global:
          resolve_timeout: 5m
          slack_api_url_file: /etc/alertmanager/secrets/alertmanager-slack-webhook/webhook-url
        route:
          group_by: ['alertname', 'namespace', 'severity']
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 4h
          receiver: 'slack-notifications'
          routes:
            - match:
                severity: critical
              receiver: 'slack-notifications'
              repeat_interval: 1h
            - match:
                severity: warning
              receiver: 'slack-notifications'
              repeat_interval: 4h
        receivers:
          - name: 'slack-notifications'
            slack_configs:
              - channel: '#alerts'
                send_resolved: true
                title: '{{ if eq .Status "firing" }}🔴{{ else }}✅{{ end }} {{ .GroupLabels.alertname }}'
                text: |
                  {{ range .Alerts }}
                  *Severity:* {{ .Labels.severity }}
                  *Summary:* {{ .Annotations.summary }}
                  *Description:* {{ .Annotations.description }}
                  {{ end }}



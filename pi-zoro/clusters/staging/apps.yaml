apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 1m0s
  # dependsOn:           # Uncomment to make apps wait for infra to reconcile first
  #   - name: infra-configs
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system    # References the GitRepository created by bootstrap
  path: ./pi-zoro/apps/staging   # Flux will now also watch this path
  prune: true            # Delete resources that are removed from Git

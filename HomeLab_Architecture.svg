<svg width="100%" viewBox="0 0 680 900" xmlns="http://www.w3.org/2000/svg">
<title>Homelab architecture</title>
<desc>A k3s cluster on two Raspberry Pi nodes managed by Flux from GitHub. Workloads schedule freely across both nodes. Storage lives on a QNAP NAS via iSCSI and NFS. Services are exposed through Cloudflare Tunnel and Tailscale.</desc>

<style>
  text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
  .title { font-size: 14px; font-weight: 600; }
  .sub { font-size: 12px; opacity: 0.75; }
  .coral-fill { fill: #FFF0EB; stroke: #D85A30; }
  .coral-text { fill: #712B13; }
  .teal-fill { fill: #E1F5EE; stroke: #0F6E56; }
  .teal-text { fill: #085041; }
  .purple-fill { fill: #EEEDFE; stroke: #534AB7; }
  .purple-text { fill: #3C3489; }
  .green-fill { fill: #EAF3DE; stroke: #3B6D11; }
  .green-text { fill: #27500A; }
  .amber-fill { fill: #FAEEDA; stroke: #854F0B; }
  .amber-text { fill: #633806; }
  .blue-fill { fill: #E6F1FB; stroke: #185FA5; }
  .blue-text { fill: #0C447C; }
  .gray-fill { fill: #F1EFE8; stroke: #888780; }
  .gray-text { fill: #444441; }
  .white-fill { fill: #FFFFFF; stroke: #B4B2A9; }
  .arr { stroke-width: 1.5; fill: none; }
  .arr-muted { stroke: #888780; }
  .arr-green { stroke: #639922; stroke-dasharray: 5 3; }
  .arr-teal { stroke: #0F6E56; }
  .arr-blue { stroke: #185FA5; }

  @media (prefers-color-scheme: dark) {
    .coral-fill { fill: #4A1B0C; stroke: #F0997B; }
    .coral-text { fill: #F5C4B3; }
    .teal-fill { fill: #04342C; stroke: #5DCAA5; }
    .teal-text { fill: #9FE1CB; }
    .purple-fill { fill: #26215C; stroke: #AFA9EC; }
    .purple-text { fill: #CECBF6; }
    .green-fill { fill: #173404; stroke: #97C459; }
    .green-text { fill: #C0DD97; }
    .amber-fill { fill: #412402; stroke: #EF9F27; }
    .amber-text { fill: #FAC775; }
    .blue-fill { fill: #042C53; stroke: #85B7EB; }
    .blue-text { fill: #B5D4F4; }
    .gray-fill { fill: #2C2C2A; stroke: #888780; }
    .gray-text { fill: #D3D1C7; }
    .white-fill { fill: #1C1C1A; stroke: #5F5E5A; }
    .sub { opacity: 0.65; }
  }
</style>

<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<rect class="gray-fill" x="170" y="20" width="170" height="56" rx="8" stroke-width="0.5"/>
<text class="title gray-text" x="255" y="42" text-anchor="middle" dominant-baseline="central">GitHub repo</text>
<text class="sub gray-text" x="255" y="60" text-anchor="middle" dominant-baseline="central">Source of truth</text>

<rect class="green-fill" x="440" y="20" width="170" height="56" rx="8" stroke-width="0.5"/>
<text class="title green-text" x="525" y="42" text-anchor="middle" dominant-baseline="central">Renovate</text>
<text class="sub green-text" x="525" y="60" text-anchor="middle" dominant-baseline="central">Automated updates</text>

<line x1="440" y1="48" x2="342" y2="48" class="arr arr-green" marker-end="url(#arrow)"/>
<text class="sub gray-text" x="391" y="38" text-anchor="middle">opens PRs</text>

<line x1="525" y1="76" x2="525" y2="116" class="arr arr-green" marker-end="url(#arrow)"/>
<text class="sub gray-text" x="535" y="98" text-anchor="start">image updates</text>

<line x1="255" y1="76" x2="255" y2="116" class="arr arr-muted" marker-end="url(#arrow)"/>
<text class="sub gray-text" x="248" y="98" text-anchor="end">Flux GitOps</text>

<rect class="purple-fill" x="20" y="118" width="640" height="330" rx="16" stroke-width="0.5"/>
<text class="title purple-text" x="340" y="142" text-anchor="middle" dominant-baseline="central">k3s cluster</text>
<text class="sub purple-text" x="340" y="160" text-anchor="middle" dominant-baseline="central">workloads schedule freely across both nodes</text>

<rect class="teal-fill" x="40" y="184" width="290" height="70" rx="10" stroke-width="0.5"/>
<text class="title teal-text" x="185" y="210" text-anchor="middle" dominant-baseline="central">zoro</text>
<text class="sub teal-text" x="185" y="228" text-anchor="middle" dominant-baseline="central">control plane · Pi 5 · 16GB</text>

<rect class="coral-fill" x="350" y="184" width="290" height="70" rx="10" stroke-width="0.5"/>
<text class="title coral-text" x="495" y="210" text-anchor="middle" dominant-baseline="central">luffy</text>
<text class="sub coral-text" x="495" y="228" text-anchor="middle" dominant-baseline="central">worker · Pi 5 · 16GB</text>

<text class="sub purple-text" x="340" y="282" text-anchor="middle">Pods schedule onto either node · failover automatic</text>

<rect class="gray-fill" x="40" y="298" width="600" height="134" rx="10" stroke-width="0.5"/>
<text class="title gray-text" x="340" y="320" text-anchor="middle" dominant-baseline="central">Workloads</text>

<rect class="white-fill" x="56" y="338" width="100" height="34" rx="6" stroke-width="0.5"/><text class="sub gray-text" x="106" y="356" text-anchor="middle" dominant-baseline="central">Homepage</text>
<rect class="white-fill" x="168" y="338" width="100" height="34" rx="6" stroke-width="0.5"/><text class="sub gray-text" x="218" y="356" text-anchor="middle" dominant-baseline="central">Linkding</text>
<rect class="white-fill" x="280" y="338" width="120" height="34" rx="6" stroke-width="0.5"/><text class="sub gray-text" x="340" y="356" text-anchor="middle" dominant-baseline="central">Audiobookshelf</text>
<rect class="white-fill" x="412" y="338" width="100" height="34" rx="6" stroke-width="0.5"/><text class="sub gray-text" x="462" y="356" text-anchor="middle" dominant-baseline="central">Prometheus</text>
<rect class="white-fill" x="524" y="338" width="100" height="34" rx="6" stroke-width="0.5"/><text class="sub gray-text" x="574" y="356" text-anchor="middle" dominant-baseline="central">Grafana</text>

<rect class="white-fill" x="56" y="384" width="110" height="34" rx="6" stroke-width="0.5"/><text class="sub gray-text" x="111" y="402" text-anchor="middle" dominant-baseline="central">Alertmanager</text>
<rect class="white-fill" x="178" y="384" width="80" height="34" rx="6" stroke-width="0.5"/><text class="sub gray-text" x="218" y="402" text-anchor="middle" dominant-baseline="central">Traefik</text>
<rect class="white-fill" x="270" y="384" width="120" height="34" rx="6" stroke-width="0.5"/><text class="sub gray-text" x="330" y="402" text-anchor="middle" dominant-baseline="central">democratic-csi</text>
<rect class="white-fill" x="402" y="384" width="100" height="34" rx="6" stroke-width="0.5"/><text class="sub gray-text" x="452" y="402" text-anchor="middle" dominant-baseline="central">SOPS + Age</text>

<line x1="180" y1="448" x2="180" y2="496" class="arr arr-muted" marker-end="url(#arrow)"/>
<text class="sub gray-text" x="172" y="474" text-anchor="end">storage</text>
<line x1="500" y1="448" x2="500" y2="496" class="arr arr-blue" marker-end="url(#arrow)"/>
<text class="sub gray-text" x="510" y="474" text-anchor="start">ingress</text>

<rect class="amber-fill" x="40" y="498" width="290" height="150" rx="10" stroke-width="0.5"/>
<text class="title amber-text" x="185" y="520" text-anchor="middle" dominant-baseline="central">QNAP TS-464 NAS</text>
<rect class="white-fill" x="56" y="536" width="125" height="96" rx="6" stroke-width="0.5"/>
<text class="title amber-text" x="118" y="558" text-anchor="middle" dominant-baseline="central">iSCSI LUNs</text>
<text class="sub amber-text" x="118" y="578" text-anchor="middle" dominant-baseline="central">Config · Metadata</text>
<text class="sub amber-text" x="118" y="594" text-anchor="middle" dominant-baseline="central">Prometheus · Grafana</text>
<text class="sub amber-text" x="118" y="610" text-anchor="middle" dominant-baseline="central">block · RWO</text>
<rect class="white-fill" x="193" y="536" width="125" height="96" rx="6" stroke-width="0.5"/>
<text class="title amber-text" x="255" y="558" text-anchor="middle" dominant-baseline="central">NFS shares</text>
<text class="sub amber-text" x="255" y="578" text-anchor="middle" dominant-baseline="central">Audiobooks</text>
<text class="sub amber-text" x="255" y="594" text-anchor="middle" dominant-baseline="central">Podcasts</text>
<text class="sub amber-text" x="255" y="610" text-anchor="middle" dominant-baseline="central">RWX · any node</text>

<rect class="blue-fill" x="440" y="498" width="200" height="150" rx="10" stroke-width="0.5"/>
<text class="title blue-text" x="540" y="520" text-anchor="middle" dominant-baseline="central">Networking</text>
<rect class="white-fill" x="456" y="536" width="80" height="96" rx="6" stroke-width="0.5"/>
<text class="title blue-text" x="496" y="556" text-anchor="middle" dominant-baseline="central">Cloudflare</text>
<text class="sub blue-text" x="496" y="576" text-anchor="middle" dominant-baseline="central">Tunnel</text>
<text class="sub blue-text" x="496" y="592" text-anchor="middle" dominant-baseline="central">No open ports</text>
<text class="sub blue-text" x="496" y="608" text-anchor="middle" dominant-baseline="central">public DNS</text>
<rect class="white-fill" x="548" y="536" width="80" height="96" rx="6" stroke-width="0.5"/>
<text class="title blue-text" x="588" y="556" text-anchor="middle" dominant-baseline="central">Tailscale</text>
<text class="sub blue-text" x="588" y="576" text-anchor="middle" dominant-baseline="central">Private</text>
<text class="sub blue-text" x="588" y="592" text-anchor="middle" dominant-baseline="central">overlay</text>
<text class="sub blue-text" x="588" y="608" text-anchor="middle" dominant-baseline="central">grafana · LAN</text>

<line x1="540" y1="648" x2="540" y2="752" class="arr arr-blue" marker-end="url(#arrow)"/>

<rect class="gray-fill" x="390" y="754" width="250" height="60" rx="10" stroke-width="0.5"/>
<text class="title gray-text" x="515" y="778" text-anchor="middle" dominant-baseline="central">Internet</text>
<text class="sub gray-text" x="515" y="798" text-anchor="middle" dominant-baseline="central">homepage · links · audiobooks</text>

</svg>

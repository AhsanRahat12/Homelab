<text class="h region-t" x="354" y="82">k3s cluster</text>
<text class="s region-t" x="354" y="100" opacity="0.8">Pods schedule freely across both nodes · failover automatic</text>

<rect class="card teal" x="354" y="120" width="216" height="54" rx="9" stroke-width="1.25"/>
<text class="lbl teal-t" x="372" y="142">zoro</text>
<text class="s card-sub" x="372" y="160">control plane · Pi 5 · 16GB</text>

<rect class="card amber" x="590" y="120" width="216" height="54" rx="9" stroke-width="1.25"/>

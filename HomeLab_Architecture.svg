<rect class="card indigo" x="490" y="234" width="96" height="34" rx="7" stroke-width="1"/><text class="s indigo-t" x="538" y="255" text-anchor="middle">linkding</text>
<rect class="card indigo" x="598" y="234" width="120" height="34" rx="7" stroke-width="1"/><text class="s indigo-t" x="658" y="255" text-anchor="middle">audiobookshelf</text>
<rect class="card indigo" x="730" y="234" width="58" height="34" rx="7" stroke-width="1"/><text class="s indigo-t" x="759" y="255" text-anchor="middle">grafana</text>

<rect class="card sky" x="372" y="280" width="102" height="34" rx="7" stroke-width="1"/><text class="s sky-t" x="423" y="301" text-anchor="middle">prometheus</text>
<rect class="card sky" x="486" y="280" width="106" height="34" rx="7" stroke-width="1"/><text class="s sky-t" x="539" y="301" text-anchor="middle">alertmanager</text>
<rect class="card sky" x="604" y="280" width="116" height="34" rx="7" stroke-width="1"/><text class="s sky-t" x="662" y="301" text-anchor="middle">democratic-csi</text>
<rect class="card sky" x="732" y="280" width="56" height="34" rx="7" stroke-width="1"/><text class="s sky-t" x="760" y="301" text-anchor="middle">traefik</text>

